name: Bug Report
description: Report a bug to help us improve NEXUS
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - nexus-relay (Server)
        - nexus-crypto (Library)
        - nexus-web (Web)
        - nexus-desktop
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: NEXUS Version
      description: Which version of NEXUS are you using? (e.g., 0.3.0)
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
  - type: textarea
    id: logs
    attributes:
      label: Logs/Stack Traces
      description: Please provide relevant output or logs.
      render: shell
