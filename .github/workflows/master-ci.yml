name: NEXUS Master CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly security scan

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  # ============================================================================
  # LINT & FORMAT CHECK
  # ============================================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check code formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (strict mode)
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::all

  # ============================================================================
  # BUILD & TEST (Multi-version)
  # ============================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        rust: [stable, 1.75.0]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexus
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check compilation
        run: cargo check --all-targets --verbose

      - name: Build debug
        run: cargo build --all --verbose

      - name: Run unit tests
        run: cargo test --lib --all --verbose

      - name: Run integration tests
        run: cargo test --test '*' --all --verbose

      - name: Build release
        run: cargo build --release --all

  # ============================================================================
  # SECURITY AUDIT
  # ============================================================================
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --deny warnings || true

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check dependencies
        run: cargo deny check || true

      - name: Verify dependency tree
        run: cargo tree --all

  # ============================================================================
  # CRYPTOGRAPHIC COMPLIANCE CHECK
  # ============================================================================
  crypto-compliance:
    name: Cryptographic Standards Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for weak cryptography
        run: |
          echo "Scanning for weak cryptographic algorithms..."
          if grep -r "md5\|MD5\|sha1\|SHA1\|DES\|RC4" \
            --include="*.rs" --include="*.toml" \
            nexus-crypto/ nexus-relay/ nexus-web/ 2>/dev/null; then
            echo " WARNING: Potentially weak crypto found - review needed"
          else
            echo " No obvious weak cryptographic algorithms detected"
          fi

      - name: Verify NIST compliance
        run: |
          echo "Verifying NIST-compliant algorithms are in use..."
          cargo build -p nexus-crypto --verbose

  # ============================================================================
  # CODE COVERAGE
  # ============================================================================
  coverage:
    name: Code Coverage Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Generate coverage (nexus-crypto)
        run: |
          cd nexus-crypto
          cargo tarpaulin --out Xml --timeout 300 --exclude-files tests/ || true

      - name: Generate coverage (nexus-relay)
        run: |
          cd nexus-relay
          cargo tarpaulin --out Xml --timeout 300 --exclude-files tests/ || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          verbose: true

  # ============================================================================
  # FUZZING (Limited Time)
  # ============================================================================
  fuzzing:
    name: Fuzzing Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run fuzz tests (30 seconds)
        run: |
          cd nexus-crypto
          if [ -d "fuzz" ]; then
            cargo +nightly fuzz run --help || echo "Cargo-fuzz not available, skipping"
          else
            echo "No fuzz targets found, skipping fuzzing"
          fi
        continue-on-error: true

  # ============================================================================
  # CONTAINER SECURITY SCAN
  # ============================================================================
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile*') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f "Dockerfile.prod" ]; then
            docker build -f Dockerfile.prod -t nexus-relay:${{ github.sha }} .
          elif [ -f "nexus-relay/Dockerfile.prod" ]; then
            docker build -f nexus-relay/Dockerfile.prod -t nexus-relay:${{ github.sha }} .
          else
            echo "No Dockerfile found, skipping Docker build"
            exit 0
          fi

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexus-relay:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()
        continue-on-error: true

  # ============================================================================
  # DOCUMENTATION BUILD & DEPLOYMENT
  # ============================================================================
  docs:
    name: Build & Deploy API Documentation
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build API documentation
        run: cargo doc --no-deps --all --lib --document-private-items

      - name: Fix documentation permissions
        run: |
          chmod -c -R +rX "target/doc/" | while read line; do
            echo "::info::$line"
          done

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'target/doc'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  # ============================================================================
  # SUMMARY NOTIFICATION
  # ============================================================================
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, security-audit, crypto-compliance, coverage, fuzzing, container-scan, docs]
    steps:
      - name: Determine overall status
        run: |
          echo " NEXUS CI/CD Pipeline Results"
          echo "================================"
          echo "Lint Check: ${{ needs.lint.result }}"
          echo "Build & Test: ${{ needs.test.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo "Crypto Compliance: ${{ needs.crypto-compliance.result }}"
          echo "Code Coverage: ${{ needs.coverage.result }}"
          echo "Fuzzing: ${{ needs.fuzzing.result }}"
          echo "Container Scan: ${{ needs.container-scan.result }}"
          echo "Documentation: ${{ needs.docs.result }}"
          echo "================================"
          
          if [ "${{ needs.lint.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]; then
            echo " Core Pipeline: PASSED"
          else
            echo " Core Pipeline: FAILED"
          fi
