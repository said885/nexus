name: NEXUS Relay CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'nexus-relay/**'
      - '.github/workflows/ci-relay.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'nexus-relay/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Code Quality Checks
  # ============================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-relay

      - name: Check formatting
        run: cargo fmt --manifest-path nexus-relay/Cargo.toml -- --check

      - name: Clippy lints
        run: cargo clippy --manifest-path nexus-relay/Cargo.toml --all-targets --all-features -- -D warnings

  # ============================================================================
  # Security Audit
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build & Test
  # ============================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nexus
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-relay

      - name: Build
        run: cargo build --manifest-path nexus-relay/Cargo.toml --verbose

      - name: Run tests
        run: cargo test --manifest-path nexus-relay/Cargo.toml --verbose
        env:
          DATABASE_URL: postgres://nexus:test@localhost:5432/nexus
          REDIS_URL: redis://localhost:6379

      - name: Run doc tests
        run: cargo test --manifest-path nexus-relay/Cargo.toml --doc

      - name: Generate coverage
        run: |
          cargo install tarpaulin
          cargo tarpaulin --manifest-path nexus-relay/Cargo.toml --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          flags: relay
          fail_ci_if_error: false

  # ============================================================================
  # Fuzzing
  # ============================================================================
  fuzz:
    name: Cryptography Fuzzing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz tests (limited time)
        run: |
          cd nexus-relay/fuzz
          timeout 120 cargo fuzz run fuzz_x3dh 2>&1 || true
          timeout 120 cargo fuzz run fuzz_double_ratchet 2>&1 || true
        continue-on-error: true

  # ============================================================================
  # Docker Build
  # ============================================================================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./nexus-relay
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nexus-relay:latest
            ghcr.io/${{ github.repository }}/nexus-relay:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/nexus-relay:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/nexus-relay:buildcache,mode=max

  # ============================================================================
  # Performance Benchmark
  # ============================================================================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nexus-relay

      - name: Run benchmarks
        run: cargo bench --manifest-path nexus-relay/Cargo.toml --no-run

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, security, test, fuzz, docker, benchmark]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality.result }}" == "failure" ]]; then
            echo "❌ Code quality checks failed"
            exit 1
          fi
          if [[ "${{ needs.security.result }}" == "failure" ]]; then
            echo "❌ Security audit failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
