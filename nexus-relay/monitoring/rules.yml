groups:
  - name: nexus_relay
    interval: 30s
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: rate(nexus_relay_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate in NEXUS Relay"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Service Down Alert
      - alert: NexusRelayDown
        expr: up{job="nexus-relay"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NEXUS Relay service is down"
          description: "Service has been down for more than 1 minute"

      # Database Connection Alert
      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection count"
          description: "Database has {{ $value }} connections (threshold: 80)"

      # Database Down Alert
      - alert: PostgresqlDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL database is down"
          description: "Database hasn't been responding for more than 1 minute"

      # Redis Memory Alert
      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis is using {{ $value | humanizePercentage }} of available memory"

      # Redis Evictions Alert
      - alert: RedisEvictions
        expr: rate(redis_evicted_keys_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis is evicting keys"
          description: "Redis is evicting keys due to memory pressure: {{ $value }} keys/sec"

      # High Latency Alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, nexus_relay_request_latency_ms) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency detected"
          description: "P95 latency is {{ $value }}ms (threshold: 500ms)"

      # TLS Certificate Expiry Alert
      - alert: TLSCertificateExpiringSoon
        expr: (tls_certificate_expiry_timestamp_seconds - time()) / 86400 < 30
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "TLS certificate expiring soon"
          description: "TLS certificate will expire in {{ $value | humanize }} days"

      # Rate Limiting Active
      - alert: RateLimitingActive
        expr: increase(nexus_relay_rate_limit_exceeded_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Rate limiting is actively blocking requests"
          description: "{{ $value }} rate limit violations in last 5 minutes"

      # Security Alert: Brute Force Detected
      - alert: BruteForceDetected
        expr: increase(nexus_relay_brute_force_attempts_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Brute force attack detected"
          description: "{{ $value }} failed login attempts detected"
