apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-relay
  namespace: nexus

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nexus-relay
  namespace: nexus
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nexus-relay
  namespace: nexus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nexus-relay
subjects:
- kind: ServiceAccount
  name: nexus-relay
  namespace: nexus
